<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Settings | NutriShake Bar</title>
    <meta name="description"
        content="Customize your NutriShake Bar experience — appearance, theme color, and language settings." />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF7EB6",
                        "primary-dark": "#FF4F81",
                        "secondary": "#FF4F81",
                        "bg-dark": "#FFF0F6",
                        "bg-darker": "#FFE4F0",
                        "bg-card": "#FFFFFF",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100dvh;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        .fill-1 {
            font-variation-settings: 'FILL' 1;
        }

        /* ===== Light / Dark body themes ===== */
        .light-theme body,
        body.light-theme {
            background: #FFF0F6;
            color: #6b1d3a;
        }

        .dark-theme body,
        body.dark-theme {
            background: #3B1F0F;
            color: #FFF5F7;
        }

        /* ===== Settings card ===== */
        .settings-card {
            background: white;
            border: 1.5px solid rgba(255, 79, 129, 0.08);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 24px rgba(255, 79, 129, 0.06);
            transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .section-title {
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #9d174d;
            margin-bottom: 14px;
            transition: color 0.4s ease;
        }

        /* ===== Mode toggle cards ===== */
        .mode-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 24px 16px;
            border-radius: 18px;
            border: 2.5px solid rgba(255, 79, 129, 0.1);
            background: rgba(255, 240, 246, 0.5);
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .mode-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(255, 126, 182, 0.15);
        }

        .mode-card:active {
            transform: scale(0.97);
        }

        .mode-card.selected {
            border-color: #FF8C00;
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.25), 0 4px 16px rgba(255, 140, 0, 0.12);
        }

        .mode-icon {
            font-size: 36px;
            line-height: 1;
            transition: transform 0.4s ease;
        }

        .mode-card:hover .mode-icon {
            transform: scale(1.12) rotate(-5deg);
        }

        .mode-label {
            font-size: 14px;
            font-weight: 700;
            color: #6b1d3a;
            transition: color 0.4s ease;
        }

        /* ===== Color palette ===== */
        .color-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 14px;
            justify-items: center;
        }

        .color-dot {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            border: 3px solid transparent;
            -webkit-tap-highlight-color: transparent;
        }

        .color-dot:hover {
            transform: scale(1.18);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.2);
        }

        .color-dot:active {
            transform: scale(0.92);
        }

        .color-dot.selected {
            border-color: white;
            box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.6), 0 4px 16px rgba(0, 0, 0, 0.18);
            transform: scale(1.1);
        }

        /* ===== Language buttons ===== */
        .lang-btn {
            flex: 1;
            padding: 12px 8px;
            border-radius: 14px;
            border: 2px solid rgba(255, 79, 129, 0.15);
            background: transparent;
            font-size: 14px;
            font-weight: 700;
            color: #6b1d3a;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: center;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .lang-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(255, 140, 0, 0.12);
        }

        .lang-btn:active {
            transform: scale(0.96);
        }

        .lang-btn.selected {
            background: linear-gradient(135deg, #FF8C00, #FFA040);
            color: white;
            border-color: transparent;
            box-shadow: 0 6px 22px rgba(255, 140, 0, 0.35);
        }

        /* ===== Done button ===== */
        .done-btn {
            width: 100%;
            padding: 16px;
            border-radius: 16px;
            border: none;
            background: linear-gradient(135deg, #FF8C00, #FFA040);
            color: white;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            font-family: 'Plus Jakarta Sans', sans-serif;
            box-shadow: 0 8px 30px rgba(255, 140, 0, 0.35);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            -webkit-tap-highlight-color: transparent;
        }

        .done-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 36px rgba(255, 140, 0, 0.45);
        }

        .done-btn:active {
            transform: scale(0.97);
        }

        /* ===== Admin link ===== */
        .admin-link {
            color: rgba(107, 29, 58, 0.35);
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .admin-link:hover {
            color: rgba(107, 29, 58, 0.65);
        }

        /* ===== Fade-in animations ===== */
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-section {
            animation: fadeSlideUp 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* ===== Toast ===== */
        .settings-toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .settings-toast.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }

        /* Nav bar */
        .nav-bar {
            transition: background 0.4s ease, border-color 0.4s ease;
        }

        .bottom-bar {
            transition: background 0.4s ease, border-color 0.4s ease;
        }

        /* ===== Page title ===== */
        .page-title {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #FF4F81, #FF8C00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Responsive color grid */
        @media (max-width: 360px) {
            .color-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 12px;
            }

            .color-dot {
                width: 36px;
                height: 36px;
            }
        }
    </style>
</head>

<body class="light-theme">

    <!-- Navbar -->
    <nav
        class="nav-bar sticky top-0 z-50 bg-bg-darker/90 backdrop-blur-xl border-b border-secondary/10 px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <button onclick="window.history.back()"
                class="w-9 h-9 rounded-full bg-secondary/10 hover:bg-secondary/20 flex items-center justify-center transition-all active:scale-90">
                <span class="material-symbols-outlined text-secondary text-xl">arrow_back</span>
            </button>
            <div>
                <h1 class="text-base font-extrabold tracking-tight">
                    <span class="nav-title-primary text-primary">Nutri</span><span
                        class="nav-title-secondary text-rose-800">Shake</span>
                    <span class="text-secondary text-sm font-bold ml-0.5">Bar</span>
                </h1>
            </div>
        </div>
        <div class="relative cursor-pointer hover:scale-110 transition-transform"
            onclick="window.location.href='cart.html'">
            <span class="material-symbols-outlined text-secondary/70">shopping_cart</span>
            <span id="cartBadge"
                class="absolute -top-1.5 -right-1.5 bg-secondary text-white text-[9px] font-bold w-4 h-4 flex items-center justify-center rounded-full"
                style="display: none;">0</span>
        </div>
    </nav>

    <!-- Main content -->
    <div class="px-5 pt-8 pb-36 max-w-lg mx-auto space-y-6">

        <!-- Page Title -->
        <div class="text-center fade-section" style="animation-delay: 0s">
            <h1 class="page-title">Settings</h1>
            <p class="text-xs mt-1 opacity-50 font-medium">Customize your NutriShake experience</p>
        </div>



        <!-- Section 2: Theme Color -->
        <div class="settings-card fade-section" style="animation-delay: 0.14s">
            <div class="section-title flex items-center gap-2">
                <span class="material-symbols-outlined text-sm">colorize</span>
                Theme Color
            </div>
            <div class="color-grid" id="colorGrid">
                <!-- Colors injected by JS -->
            </div>
        </div>

        <!-- Section 3: Language -->
        <div class="settings-card fade-section" style="animation-delay: 0.21s">
            <div class="section-title flex items-center gap-2">
                <span class="material-symbols-outlined text-sm">translate</span>
                Language
            </div>
            <div class="flex gap-3">
                <button class="lang-btn selected" data-lang="en" onclick="setLanguage('en')">English</button>
                <button class="lang-btn" data-lang="ta" onclick="setLanguage('ta')">தமிழ்</button>
                <button class="lang-btn" data-lang="hi" onclick="setLanguage('hi')">हिन्दी</button>
            </div>
        </div>

        <!-- Section 4: Done Button -->
        <div class="fade-section" style="animation-delay: 0.28s">
            <button class="done-btn" onclick="saveAndGoHome()">DONE</button>
        </div>

        <!-- Admin link -->
        <div class="text-center fade-section" style="animation-delay: 0.32s">
            <a href="admin-login.html" class="admin-link">Administrative Login</a>
        </div>
    </div>

    <!-- Toast notification -->
    <div class="settings-toast" id="settingsToast">
        <div
            style="display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#FF8C00,#FFA040);color:white;padding:12px 22px;border-radius:999px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:700;box-shadow:0 8px 28px rgba(255,140,0,0.35);white-space:nowrap;">
            <span id="toastIcon" style="font-size:16px;">✅</span>
            <span id="toastMsg">Settings saved!</span>
        </div>
    </div>

    <!-- Bottom Nav -->
    <div
        class="bottom-bar fixed bottom-0 left-0 right-0 z-50 bg-bg-darker/95 backdrop-blur-xl border-t border-secondary/8 px-4 py-2.5 flex justify-between items-center">
        <a class="bottom-link-inactive flex flex-col items-center gap-1 text-rose-800/40 hover:text-secondary transition-colors"
            href="index.html">
            <span class="material-symbols-outlined">home</span>
            <span class="text-[10px] font-medium">Home</span>
        </a>
        <a class="bottom-link-inactive flex flex-col items-center gap-1 text-rose-800/40 hover:text-secondary transition-colors"
            href="menu.html">
            <span class="material-symbols-outlined">restaurant_menu</span>
            <span class="text-[10px] font-medium">Menu</span>
        </a>
        <a class="bottom-link-inactive flex flex-col items-center gap-1 text-rose-800/40 hover:text-secondary transition-colors"
            href="deals.html">
            <span class="material-symbols-outlined">local_offer</span>
            <span class="text-[10px] font-medium">Deals</span>
        </a>
        <a class="flex flex-col items-center gap-1 text-secondary" href="settings.html">
            <span class="material-symbols-outlined fill-1">settings</span>
            <span class="text-[10px] font-bold">Settings</span>
        </a>
    </div>

    <script src="cart.js"></script>
    <script>
        // ===========================
        // Theme Colors Palette
        // ===========================
        const ACCENT_COLORS = [
            { name: 'Brown', hex: '#8B4513' },
            { name: 'Red', hex: '#E53935' },
            { name: 'Mint', hex: '#66BB6A' },
            { name: 'Cyan', hex: '#26C6DA' },
            { name: 'Blue', hex: '#42A5F5' },
            { name: 'Navy', hex: '#3949AB' },
            { name: 'Teal', hex: '#009688' },
            { name: 'Yellow', hex: '#FDD835' },
            { name: 'Orange', hex: '#FF8C00' },
            { name: 'Coral', hex: '#FF7043' },
            { name: 'Purple', hex: '#AB47BC' },
            { name: 'Rose', hex: '#EC407A' },
        ];

        // ===========================
        // State
        // ===========================
        let currentAppearance = localStorage.getItem('site-theme') || 'light';
        let currentAccent = localStorage.getItem('ns_accent') || '#FF8C00';
        let currentLanguage = localStorage.getItem('ns_language') || 'en';

        // ===========================
        // Init
        // ===========================
        function init() {
            applyAppearance(currentAppearance);
            buildColorGrid();
            applyAccent(currentAccent);
            applyLanguage(currentLanguage);
        }

        // ===========================
        // Appearance (Light / Dark)
        // ===========================
        function setAppearance(mode) {
            currentAppearance = mode;
            applyAppearance(mode);
            localStorage.setItem('site-theme', mode);
        }

        function applyAppearance(mode) {
            const html = document.documentElement;
            html.classList.remove('light-theme', 'dark-theme');
            html.classList.add(mode + '-theme');

            const body = document.body;
            body.classList.remove('light-theme', 'dark-theme');
            body.classList.add(mode + '-theme');

            // Toggle card selection
            document.getElementById('modeLight').classList.toggle('selected', mode === 'light');
            document.getElementById('modeDark').classList.toggle('selected', mode === 'dark');
        }

        // ===========================
        // Theme Color
        // ===========================
        function buildColorGrid() {
            const grid = document.getElementById('colorGrid');
            grid.innerHTML = '';
            ACCENT_COLORS.forEach(c => {
                const dot = document.createElement('div');
                dot.className = 'color-dot';
                dot.style.background = c.hex;
                dot.title = c.name;
                dot.dataset.color = c.hex;
                dot.addEventListener('click', () => selectAccent(c.hex));
                grid.appendChild(dot);
            });
        }

        function selectAccent(hex) {
            currentAccent = hex;
            applyAccent(hex);
            localStorage.setItem('ns_accent', hex);
        }

        function applyAccent(hex) {
            // Highlight selected dot
            document.querySelectorAll('.color-dot').forEach(dot => {
                dot.classList.toggle('selected', dot.dataset.color === hex);
            });

            // Update Done button gradient
            const doneBtn = document.querySelector('.done-btn');
            if (doneBtn) {
                doneBtn.style.background = `linear-gradient(135deg, ${hex}, ${lightenColor(hex, 25)})`;
                doneBtn.style.boxShadow = `0 8px 30px ${hex}55`;
            }

            // Update mode card borders — only selected gets accent
            document.querySelectorAll('.mode-card').forEach(card => {
                if (card.classList.contains('selected')) {
                    card.style.borderColor = hex;
                    card.style.boxShadow = `0 0 20px ${hex}40, 0 4px 16px ${hex}20`;
                } else {
                    card.style.borderColor = '';
                    card.style.boxShadow = '';
                }
            });

            // Update selected language button
            document.querySelectorAll('.lang-btn.selected').forEach(btn => {
                btn.style.background = `linear-gradient(135deg, ${hex}, ${lightenColor(hex, 25)})`;
                btn.style.boxShadow = `0 6px 22px ${hex}55`;
            });

            // Store as CSS custom property for potential use
            document.documentElement.style.setProperty('--ns-accent', hex);
        }

        function lightenColor(hex, percent) {
            const num = parseInt(hex.replace('#', ''), 16);
            const r = Math.min(255, (num >> 16) + Math.round(2.55 * percent));
            const g = Math.min(255, ((num >> 8) & 0x00FF) + Math.round(2.55 * percent));
            const b = Math.min(255, (num & 0x0000FF) + Math.round(2.55 * percent));
            return `#${(1 << 24 | r << 16 | g << 8 | b).toString(16).slice(1)}`;
        }

        // ===========================
        // Language
        // ===========================
        function setLanguage(lang) {
            currentLanguage = lang;
            applyLanguage(lang);
            localStorage.setItem('ns_language', lang);
        }

        function applyLanguage(lang) {
            document.querySelectorAll('.lang-btn').forEach(btn => {
                const isSelected = btn.dataset.lang === lang;
                btn.classList.toggle('selected', isSelected);
                if (isSelected) {
                    btn.style.background = `linear-gradient(135deg, ${currentAccent}, ${lightenColor(currentAccent, 25)})`;
                    btn.style.boxShadow = `0 6px 22px ${currentAccent}55`;
                    btn.style.borderColor = 'transparent';
                    btn.style.color = 'white';
                } else {
                    btn.style.background = 'transparent';
                    btn.style.boxShadow = 'none';
                    btn.style.borderColor = '';
                    btn.style.color = '';
                }
            });
        }

        // ===========================
        // Done — Save & Navigate
        // ===========================
        function saveAndGoHome() {
            localStorage.setItem('site-theme', currentAppearance);
            localStorage.setItem('ns_accent', currentAccent);
            localStorage.setItem('ns_language', currentLanguage);
            showSettingsToast('Settings saved!', '✅');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 800);
        }

        // ===========================
        // Admin Login
        // ===========================
        function handleAdminLogin(e) {
            e.preventDefault();
            showSettingsToast('Admin access coming soon', '🔐');
        }

        // ===========================
        // Toast
        // ===========================
        let _sToastTimer;
        function showSettingsToast(msg, icon = '✅') {
            const toast = document.getElementById('settingsToast');
            document.getElementById('toastMsg').textContent = msg;
            document.getElementById('toastIcon').textContent = icon;
            clearTimeout(_sToastTimer);
            toast.classList.add('visible');
            _sToastTimer = setTimeout(() => {
                toast.classList.remove('visible');
            }, 2200);
        }

        // ===========================
        // Re-apply accent on mode-card selection changes
        // ===========================
        const origSetAppearance = setAppearance;
        setAppearance = function (mode) {
            origSetAppearance(mode);
            // Re-apply accent colors to newly selected card
            setTimeout(() => applyAccent(currentAccent), 50);
        };

        // Init on load
        init();
    </script>
</body>

</html>
